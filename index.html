<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Map Wheel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #dfbb45, #bf953f, #fcf6ba, #b38728);
            --dark-bg: #0d0d0d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: white;
            overflow: hidden;
        }

        .main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-outer-border {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            padding: 12px;
            background: var(--gold-gradient);
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.5), inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #222;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: #222;
        }

        .wheel {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .segment span {
            position: absolute;
            transform: rotate(22deg) translateY(-80px);
            font-weight: 900;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            color: #fff;
            white-space: nowrap;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: var(--gold-gradient);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        .center-diamond {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--gold-gradient);
            border-radius: 50%;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,1);
            border: 2px solid #333;
        }

        .center-diamond::after {
            content: '💎';
            font-size: 20px;
        }

        .btn-spin {
            margin-top: 40px;
            padding: 15px 50px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 50px;
            color: #222;
            font-size: 22px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(191, 149, 63, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-spin:hover {
            box-shadow: 0 8px 25px rgba(191, 149, 63, 0.6);
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        h2 {
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #dfbb45;
            text-shadow: 0 0 10px rgba(223, 187, 69, 0.3);
            font-size: 24px;
        }
    </style>
</head>
<body>

    <h2>NSP Map System</h2>

    <div class="main-container">
        <div class="pointer"></div>
        <div class="wheel-outer-border">
            <div class="center-diamond"></div>
            <div class="wheel-container" id="wheel-container">
                <div class="wheel" id="wheel"></div>
            </div>
        </div>
    </div>

    <button class="btn-spin" id="spin-button">Start Game!</button>

    <script>
        // Configuration: Prize values and their corresponding colors
        const CONFIG = {
            prizes: ["10.00", "5000", "Loss", "3000", "1000", "5000", "Better Luck", "3000"],
            colors: [
                "#4a0e0e", "#1a3a3a", "#4a3b0e", "#0e1a4a", 
                "#1a4a1e", "#3a0e4a", "#222222", "#554400"
            ],
            spinDuration: 5000,
            minFullRotations: 8
        };

        // DOM Elements
        const wheel = document.getElementById('wheel');
        const wheelContainer = document.getElementById('wheel-container');
        const spinButton = document.getElementById('spin-button');

        // State management
        let currentRotation = 0;
        let isSpinning = false;

        /**
         * Initialize the wheel by creating segments
         */
        function initializeWheel() {
            const segmentAngle = 360 / CONFIG.prizes.length;
            
            CONFIG.prizes.forEach((prize, index) => {
                const segment = createSegment(prize, index, segmentAngle);
                wheel.appendChild(segment);
            });
        }

        /**
         * Create a single wheel segment
         */
        function createSegment(prize, index, angle) {
            const segment = document.createElement('div');
            segment.className = 'segment';
            segment.style.transform = `rotate(${index * angle}deg)`;
            segment.style.backgroundColor = CONFIG.colors[index];
            
            const label = document.createElement('span');
            label.textContent = prize;
            segment.appendChild(label);
            
            return segment;
        }

        /**
         * Calculate the winning prize based on rotation
         */
        function calculateWinner(rotation) {
            const actualDegree = rotation % 360;
            const segmentAngle = 360 / CONFIG.prizes.length;
            const pointerOffset = segmentAngle / 2;
            const prizeIndex = Math.floor(((360 - actualDegree + pointerOffset) % 360) / segmentAngle);
            
            return CONFIG.prizes[prizeIndex];
        }

        /**
         * Display the result to the user
         */
        function showResult(prize) {
            const isLoss = prize === "Loss" || prize === "Better Luck";
            const message = isLoss 
                ? `Sorry! ${prize}` 
                : `Congratulations! You won ${prize} NSP`;
            
            alert(message);

            // Close Telegram WebApp if available
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.close();
            }
        }

        /**
         * Spin the wheel with animation
         */
        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            spinButton.disabled = true;
            
            // Calculate random rotation (minimum 8 full rotations)
            const randomDegree = Math.floor(Math.random() * 360) + (360 * CONFIG.minFullRotations);
            currentRotation += randomDegree;
            
            // Apply rotation with smooth animation
            wheelContainer.style.transform = `rotate(${currentRotation}deg)`;
            
            // Determine winner after animation completes
            setTimeout(() => {
                isSpinning = false;
                spinButton.disabled = false;
                
                const winner = calculateWinner(currentRotation);
                showResult(winner);
            }, CONFIG.spinDuration);
        }

        /**
         * Initialize Telegram WebApp
         */
        function initializeTelegramApp() {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.expand();
                window.Telegram.WebApp.ready();
            }
        }

        // Event Listeners
        spinButton.addEventListener('click', spin);

        // Initialize application
        document.addEventListener('DOMContentLoaded', () => {
            initializeWheel();
            initializeTelegramApp();
        });
    </script>
</body>
</html>
