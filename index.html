<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>عجلة الحظ - KHARTAH BOT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --red:   #c0392b;
  --gold:  #f0c040;
  --gold2: #d4a017;
  --dark:  #0a0608;
  --win:   #00ff99;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  color: white;
  background-image:
    radial-gradient(ellipse at 50% 0%,  rgba(192,57,43,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(0,229,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(192,57,43,0.10) 0%, transparent 50%);
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    linear-gradient(90deg, transparent 49.8%, rgba(0,229,255,0.03) 50%, transparent 50.2%),
    linear-gradient(0deg,  transparent 49.8%, rgba(0,229,255,0.03) 50%, transparent 50.2%);
  pointer-events:none; z-index:0;
}

/* ── الهيدر ── */
.header {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center; gap:6px;
  margin-bottom:16px;
}

.logo-wrap { position:relative; width:68px; height:68px; }
.logo-ring {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid var(--gold);
  box-shadow: 0 0 16px rgba(240,192,64,0.5), inset 0 0 16px rgba(192,57,43,0.3);
  animation: ringPulse 3s ease-in-out infinite alternate;
}
@keyframes ringPulse {
  from { box-shadow: 0 0 10px rgba(240,192,64,0.4), inset 0 0 10px rgba(192,57,43,0.2); }
  to   { box-shadow: 0 0 28px rgba(240,192,64,0.8), inset 0 0 20px rgba(192,57,43,0.5); }
}
.logo-k {
  width:100%; height:100%; border-radius:50%;
  background: radial-gradient(circle, #2a0f0a 0%, #150505 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; font-weight:900; color:var(--gold);
  text-shadow: 0 0 12px rgba(240,192,64,0.8);
}
.brand-name {
  font-size:1.5rem; font-weight:900; letter-spacing:3px;
  background: linear-gradient(135deg, var(--gold) 0%, #fff5c0 50%, var(--gold2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  filter: drop-shadow(0 0 12px rgba(240,192,64,0.5));
}
.brand-sub {
  font-size:0.72rem; color:rgba(255,255,255,0.35); letter-spacing:2px;
}

/* ── الرصيد ── */
.balance-box {
  position:relative; z-index:1;
  background: linear-gradient(135deg, rgba(192,57,43,0.15), rgba(0,0,0,0.4));
  border:1px solid rgba(240,192,64,0.25);
  border-radius:16px; padding:10px 36px;
  text-align:center; margin-bottom:18px;
  backdrop-filter:blur(8px);
}
.balance-label { font-size:0.72rem; color:rgba(255,255,255,0.38); letter-spacing:1px; }
.balance-value { font-size:1.45rem; font-weight:900; color:var(--gold); letter-spacing:1px; }

/* ── العجلة ── */
.wheel-section {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center; margin-bottom:18px;
}
.wheel-glow {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:340px; height:340px; border-radius:50%;
  background: radial-gradient(circle, rgba(192,57,43,0.18) 0%, transparent 70%);
  pointer-events:none;
  animation: glowPulse 4s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  from { opacity:0.6; transform:translate(-50%,-50%) scale(0.95); }
  to   { opacity:1;   transform:translate(-50%,-50%) scale(1.05); }
}

.wheel-wrap { position:relative; width:300px; height:300px; }

.pointer-wrap {
  position:absolute; top:-20px; left:50%;
  transform:translateX(-50%);
  z-index:20; display:flex; flex-direction:column; align-items:center;
}
.pointer-stick {
  width:4px; height:16px;
  background: linear-gradient(to bottom, var(--gold), var(--red));
  border-radius:2px 2px 0 0;
}
.pointer-head {
  width:0; height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-top:24px solid var(--gold);
  filter: drop-shadow(0 2px 8px rgba(240,192,64,0.9));
}

canvas#wheel {
  width:300px; height:300px; border-radius:50%;
  box-shadow:
    0 0 0 3px var(--gold2),
    0 0 0 6px rgba(192,57,43,0.4),
    0 0 0 10px rgba(240,192,64,0.1),
    0 0 50px rgba(192,57,43,0.3);
  display:block;
}

/* ── زر اللف ── */
.spin-btn {
  position:relative; z-index:1;
  width:100%; max-width:300px; padding:15px;
  border:none; border-radius:16px;
  font-family:'Cairo',sans-serif; font-size:1.1rem; font-weight:900;
  cursor:pointer;
  background: linear-gradient(135deg, #c0392b 0%, #8b0000 50%, #c0392b 100%);
  color:var(--gold);
  border:1px solid rgba(240,192,64,0.4);
  box-shadow: 0 4px 20px rgba(192,57,43,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.2s; letter-spacing:1px;
}
.spin-btn:hover:not(:disabled) {
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(192,57,43,0.7);
  color:#fff5a0;
}
.spin-btn:active:not(:disabled) { transform:scale(0.98); }
.spin-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; }

/* ── نافذة النتيجة ── */
.overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.88);
  z-index:100; display:none;
  align-items:center; justify-content:center;
  backdrop-filter:blur(8px);
}
.overlay.show { display:flex; }

.result-card {
  background: linear-gradient(160deg, #1a0a08, #0f0505);
  border:1px solid rgba(240,192,64,0.4);
  border-radius:24px; padding:38px 28px;
  text-align:center; max-width:300px; width:90%;
  box-shadow:
    0 0 0 1px rgba(192,57,43,0.3),
    0 0 60px rgba(192,57,43,0.25);
  animation:pop 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes pop {
  from { transform:scale(0.4); opacity:0; }
  to   { transform:scale(1);   opacity:1; }
}
.result-card::before {
  content:'';
  display:block; width:60px; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  margin:0 auto 20px;
}

.res-emoji  { font-size:3.8rem; margin-bottom:8px; }
.res-title  { font-size:1.2rem; font-weight:900; color:var(--gold); margin-bottom:12px; letter-spacing:1px; }
.res-amount {
  font-size:2.4rem; font-weight:900; color:var(--win);
  text-shadow:0 0 20px rgba(0,255,153,0.5);
  margin-bottom:6px;
}
.res-zero   { font-size:1.8rem; font-weight:900; color:#ff6b6b; margin-bottom:6px; }
.res-sub    { color:rgba(255,255,255,0.35); font-size:0.8rem; margin-bottom:24px; letter-spacing:1px; }

.res-btn {
  background:linear-gradient(135deg, #c0392b, #8b0000);
  color:var(--gold); border:1px solid rgba(240,192,64,0.3);
  border-radius:14px; padding:12px 44px;
  font-family:'Cairo',sans-serif; font-size:1rem; font-weight:700;
  cursor:pointer; transition:all 0.2s; letter-spacing:1px;
}
.res-btn:hover { transform:scale(1.04); color:#fff5a0; }

/* كونفيتي */
.conf {
  position:fixed; width:8px; height:8px;
  top:-10px; border-radius:2px;
  animation:fall linear forwards;
  z-index:200; pointer-events:none;
}
@keyframes fall {
  to { top:110vh; transform:rotate(720deg) translateX(var(--dx)); opacity:0; }
}
</style>
</head>
<body>

<!-- نافذة النتيجة -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="res-emoji" id="resEmoji">🎰</div>
    <div class="res-title"  id="resTitle">النتيجة</div>
    <div id="resAmount"></div>
    <div class="res-sub"    id="resSub"></div>
    <button class="res-btn" onclick="closeOverlay()">حسناً ✓</button>
  </div>
</div>

<!-- الهيدر -->
<div class="header">
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-k">K</div>
  </div>
  <div class="brand-name">KHARTAH BOT</div>
  <div class="brand-sub">عجلة الحظ</div>
</div>

<!-- الرصيد -->
<div class="balance-box">
  <div class="balance-label">رصيدك الحالي</div>
  <div class="balance-value" id="balVal">100,000 NSP</div>
</div>

<!-- العجلة -->
<div class="wheel-section">
  <div class="wheel-glow"></div>
  <div class="wheel-wrap">
    <div class="pointer-wrap">
      <div class="pointer-stick"></div>
      <div class="pointer-head"></div>
    </div>
    <canvas id="wheel" width="300" height="300"></canvas>
  </div>
</div>

<!-- زر اللف -->
<button class="spin-btn" id="spinBtn" onclick="doSpin()">
  🎰 &nbsp; الف العجلة!
</button>

<script>
const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');
const CX = 150, CY = 150, R = 147;

const SEGS = [
  { prize:10000,  label:'10,000',  sub:'NSP', bg1:'#0d3d1e', bg2:'#1e7a40', fg:'#7dffaa', dot:'#00ff77' },
  { prize:0,      label:'حظاً',    sub:'أوفر', bg1:'#2a0808', bg2:'#5c1010', fg:'#ff8888', dot:'#ff4444' },
  { prize:10000,  label:'10,000',  sub:'NSP', bg1:'#0d3d1e', bg2:'#1a6b35', fg:'#7dffaa', dot:'#00ff77' },
  { prize:50000,  label:'50,000',  sub:'NSP', bg1:'#0a1a4a', bg2:'#1a3a8c', fg:'#aaccff', dot:'#4488ff' },
  { prize:10000,  label:'10,000',  sub:'NSP', bg1:'#0d3d1e', bg2:'#1e7a40', fg:'#7dffaa', dot:'#00ff77' },
  { prize:0,      label:'حظاً',    sub:'أوفر', bg1:'#2a0808', bg2:'#5c1010', fg:'#ff8888', dot:'#ff4444' },
  { prize:10000,  label:'10,000',  sub:'NSP', bg1:'#0d3d1e', bg2:'#1a6b35', fg:'#7dffaa', dot:'#00ff77' },
  { prize:100000, label:'100,000', sub:'NSP', bg1:'#3a2200', bg2:'#7a4800', fg:'#ffe066', dot:'#ffd700' },
];

const N   = SEGS.length;
const ARC = (2 * Math.PI) / N;
let wheelAngle = 0;
let spinning   = false;
let balance    = 100000;

function draw(wa) {
  ctx.clearRect(0, 0, 300, 300);

  for (let i = 0; i < N; i++) {
    const seg   = SEGS[i];
    const start = wa + i * ARC;
    const end   = start + ARC;
    const mid   = start + ARC / 2;

    const gx1 = CX + (R*0.3)*Math.cos(mid), gy1 = CY + (R*0.3)*Math.sin(mid);
    const gx2 = CX + R*Math.cos(mid),        gy2 = CY + R*Math.sin(mid);
    const grad = ctx.createLinearGradient(gx1,gy1,gx2,gy2);
    grad.addColorStop(0, seg.bg1);
    grad.addColorStop(1, seg.bg2);

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = 'rgba(240,192,64,0.4)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // نقطة ملونة
    ctx.beginPath();
    ctx.arc(CX+(R-12)*Math.cos(mid), CY+(R-12)*Math.sin(mid), 4, 0, 2*Math.PI);
    ctx.fillStyle = seg.dot;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // النص
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(mid);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur  = 4;

    ctx.font = 'bold 14px Cairo';
    ctx.fillStyle = seg.fg;
    ctx.fillText(seg.label, R - 22, -5);

    ctx.font = '600 10px Cairo';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(seg.sub, R - 22, 7);

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // الحلقة الخارجية
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(240,192,64,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // نقاط الحافة
  for (let i = 0; i < 40; i++) {
    const a = (i/40)*2*Math.PI;
    ctx.beginPath();
    ctx.arc(CX+(R-5)*Math.cos(a), CY+(R-5)*Math.sin(a), i%5===0?3:1.5, 0, 2*Math.PI);
    ctx.fillStyle = i%5===0 ? 'rgba(240,192,64,0.9)' : 'rgba(255,255,255,0.15)';
    ctx.fill();
  }

  // المركز
  const halo = ctx.createRadialGradient(CX,CY,18,CX,CY,34);
  halo.addColorStop(0,'rgba(192,57,43,0.4)');
  halo.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(CX,CY,34,0,2*Math.PI);
  ctx.fillStyle = halo; ctx.fill();

  const cg = ctx.createRadialGradient(CX-4,CY-4,2,CX,CY,26);
  cg.addColorStop(0,'#ffe066');
  cg.addColorStop(0.5,'#c0392b');
  cg.addColorStop(1,'#5a0a00');
  ctx.beginPath(); ctx.arc(CX,CY,26,0,2*Math.PI);
  ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = 'rgba(240,192,64,0.9)';
  ctx.lineWidth = 2.5; ctx.stroke();

  ctx.font = 'bold 20px Cairo';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffe066';
  ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 6;
  ctx.fillText('K', CX, CY+1);
  ctx.shadowBlur = 0;
}

draw(wheelAngle);

function pickPrize() {
  const r = Math.random()*100;
  if      (r < 90) return 10000;
  else if (r < 95) return 50000;
  else if (r < 96) return 100000;
  else             return 0;
}

function segsFor(prize) {
  return SEGS.map((s,i)=>s.prize===prize?i:-1).filter(i=>i>=0);
}

function calcEndAngle(segIdx) {
  const jitter = (Math.random()*0.5-0.25)*ARC;
  const base   = -Math.PI/2 - (segIdx*ARC + ARC/2) + jitter;
  const spins  = 5 + Math.floor(Math.random()*4);
  let target   = base + spins*2*Math.PI;
  while (target <= wheelAngle + 2*Math.PI) target += 2*Math.PI;
  return target;
}

function doSpin() {
  if (spinning) return;
  if (balance < 50000) {
    showResult('❌','رصيد غير كافٍ','','تحتاج 50,000 NSP للف',false);
    return;
  }
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const prize    = pickPrize();
  const possible = segsFor(prize);
  const segIdx   = possible[Math.floor(Math.random()*possible.length)];
  const endAngle = calcEndAngle(segIdx);
  const startA   = wheelAngle, diff = endAngle - startA;
  const dur      = 4200 + Math.random()*1200;
  const t0       = performance.now();

  function easeOut(t) { return 1-Math.pow(1-t,3); }

  function frame(now) {
    const p = Math.min((now-t0)/dur, 1);
    wheelAngle = startA + diff*easeOut(p);
    draw(wheelAngle);
    if (p < 1) {
      requestAnimationFrame(frame);
    } else {
      wheelAngle = endAngle;
      draw(wheelAngle);
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      balance += prize;
      document.getElementById('balVal').textContent = balance.toLocaleString()+' NSP';
      setTimeout(()=>showWinResult(prize), 400);
    }
  }
  requestAnimationFrame(frame);
}

function showWinResult(p) {
  if      (p>=100000){ confetti(30); showResult('👑','الجائزة الكبرى! 🎉', p.toLocaleString()+' NSP','تمت إضافة المبلغ لرصيدك',true); }
  else if (p>=50000) { confetti(16); showResult('🥈','مبروك! 🎊',          p.toLocaleString()+' NSP','تمت إضافة المبلغ لرصيدك',true); }
  else if (p>0)      {               showResult('🥉','ربحت!',              p.toLocaleString()+' NSP','تمت إضافة المبلغ لرصيدك',true); }
  else               {               showResult('😔','حظاً أوفر!',          '','جرب مرة أخرى غداً',false); }
}

function showResult(emoji,title,amount,sub,win){
  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resSub').textContent   = sub;
  const el = document.getElementById('resAmount');
  el.innerHTML = amount ? `<div class="${win?'res-amount':'res-zero'}">${amount}</div>` : '';
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
}

function confetti(n){
  const cols=['#FFD700','#c0392b','#e74c3c','#00ff99','#ffffff','#ffe066','#ff8800'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='conf';
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};--dx:${-80+Math.random()*160}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}
</script>
</body>
</html>
